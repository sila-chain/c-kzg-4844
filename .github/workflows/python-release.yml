name: Python Package

on:
  release:
    types:
      - published
    branches:
      - main
  # Allows us run the action manually.
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-13 # x86_64
          - macos-14 # aarch64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      # On Linux, use QEMU to build multiple platforms.
      - name: Setup QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: all

      # Need this for macos-14, which doesn't come with python for some reason.
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      # Need this to get cl.exe on the path.
      - name: Set up Visual Studio shell
        if: runner.os == 'Windows'
        uses: egor-tensin/vs-shell@54e4148eac794e4580591c2e0b7750f14b7891fc # v2.2

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:

          # We have QEMU setup and can build everything.
          CIBW_ARCHS_LINUX: x86_64 i686 aarch64
          # For some reason these don't use the same distro.
          # musllinux uses apk & manylinux uses yum.
          CIBW_BEFORE_BUILD_LINUX: |
            if command -v apk > /dev/null; then
              apk add --update clang && make -C src blst
            elif command -v yum > /dev/null; then
              yum install -y clang && make -C src blst
            fi

          # Building x86 (32-bit) package is difficult.
          # We're missing the 32-bit Python library.
          CIBW_ARCHS_WINDOWS: AMD64
          # We need blst.lib (via MSVC) which our Makefile doesn't support.
          CIBW_BEFORE_BUILD_WINDOWS: |
            cd blst && build.bat && cp blst.lib ../lib && cp bindings/*.h ../inc

          CIBW_BEFORE_BUILD_MACOS: |
            make -C src blst

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*

  # Build the source distribution under Linux
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install setuptools
        run: python -m pip install setuptools

      - name: Build source distribution
        run: python setup.py sdist

      - name: Store artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/*.tar.gz
          name: sdist


  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          path: publish-dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: sdist
          path: publish-dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          password: ${{ secrets.PYPI_PASSWORD }}
          packages-dir: publish-dist
          skip-existing: true
