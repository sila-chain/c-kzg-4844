name: C
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash
    working-directory: src

jobs:
  tests:
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      # Checkout repository and blst submodule.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      # Check formatting.
      # Only need to check this once.
      - name: Run clang-format
        if: matrix.os == 'ubuntu-latest'
        uses: jidicula/clang-format-action@654a770daa28443dd111d133e4083e21c1075674 # v4.18.0
        with:
          clang-format-version: '21'
          check-path: 'src'
          exclude-regex: 'tinytest.h'

      # Check param formatting.
      # Only need to check this once.
      - name: Check param formatting
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 ../scripts/format_c_params.py
          git diff --exit-code

      # Run tests.
      - name: Test
        run: make test

      # Run sanitizers.
      # Doesn't work on Windows.
      - name: Clang Sanitizers
        if: matrix.os != 'windows-latest'
        run: CC=clang make sanitize

      # Run static analyzer.
      # Doesn't work on Windows.
      - name: Clang Static Analyzer
        if: matrix.os != 'windows-latest'
        run: make analyze

      # Install LLVM for coverage report.
      # Already installed on macOS.
      # Doesn't work on Windows.
      - name: Install LLVM
        if: matrix.os == 'ubuntu-latest'
        uses: egor-tensin/setup-clang@23bc15cd4207e45f1566447deb48f4ff3ef932cb # v2.3

      # Generate the coverage report.
      # Doesn't work on Windows.
      - name: Generate coverage report
        if: matrix.os != 'windows-latest'
        run: make coverage

      # Upload the coverage report.
      # Didn't generate it for Windows.
      - name: Save coverage report
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.os }}
          path: src/coverage.html
